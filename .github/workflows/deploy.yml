name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/apps/gather
            git pull origin main
            docker compose -f /opt/apps/docker-compose.yml build gather
            docker compose -f /opt/apps/docker-compose.yml up -d gather
